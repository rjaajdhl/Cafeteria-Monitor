<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0f2f5; font-family: 'Inter', sans-serif; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; gap: 8px; }
  .card { flex: 1; border-radius: 10px; padding: 10px 14px; border: 1px solid; }
  .card-label { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; opacity: .8; }
  .card-value { font-family: 'DM Mono', monospace; font-size: 26px; font-weight: 500; margin-top: 1px; }
  .card-sub { font-size: 10px; font-weight: 600; margin-top: 1px; }
  /* Slot subtotals */
  .slot-card { flex: 1; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 8px 12px; }
  .slot-top { width: 100%; height: 3px; border-radius: 2px; margin-bottom: 6px; }
  .slot-name { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
  .slot-nums { display: flex; gap: 6px; align-items: baseline; }
  .slot-range { font-family: 'DM Mono', monospace; font-size: 9px; color: #9ca3af; margin-top: 2px; }
</style>
</head>
<body>
<div>
  <div style="font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#9ca3af;margin-bottom:6px">Stats Cards</div>
  <div class="row">
    <div class="card" style="background:#f0fdf4;border-color:#bbf7d0">
      <div class="card-label" style="color:#16a34a">Allowed</div>
      <div class="card-value" style="color:#16a34a">247</div>
    </div>
    <div class="card" style="background:#fff5f5;border-color:#fecaca">
      <div class="card-label" style="color:#dc2626">Denied</div>
      <div class="card-value" style="color:#dc2626">18</div>
    </div>
    <div class="card" style="background:#fffbeb;border-color:#fde68a">
      <div class="card-label" style="color:#d97706">Duplicates</div>
      <div class="card-value" style="color:#d97706">5</div>
      <div class="card-sub" style="color:#d97706">⚠ Fraud risk</div>
    </div>
    <div class="card" style="background:#fff;border-color:#e5e7eb">
      <div class="card-label" style="color:#374151">Total</div>
      <div class="card-value" style="color:#374151">265</div>
    </div>
  </div>
</div>
<div>
  <div style="font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#9ca3af;margin-bottom:6px">Slot Subtotals</div>
  <div class="row">
    <div class="slot-card">
      <div class="slot-top" style="background:#0369a1"></div>
      <div class="slot-name" style="color:#0369a1">Breakfast</div>
      <div class="slot-nums">
        <span style="font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:#16a34a">44</span>
        <span style="font-size:10px;color:#9ca3af">allowed</span>
      </div>
      <div class="slot-range">07:30–09:00</div>
    </div>
    <div class="slot-card">
      <div class="slot-top" style="background:#7c3aed"></div>
      <div class="slot-name" style="color:#7c3aed">Lunch</div>
      <div class="slot-nums">
        <span style="font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:#16a34a">78</span>
        <span style="font-size:10px;color:#9ca3af">allowed</span>
        <span style="font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:#dc2626;margin-left:4px">3</span>
        <span style="font-size:10px;color:#9ca3af">denied</span>
      </div>
      <div class="slot-range">11:30–13:00</div>
    </div>
    <div class="slot-card">
      <div class="slot-top" style="background:#b45309"></div>
      <div class="slot-name" style="color:#b45309">Dinner</div>
      <div class="slot-nums">
        <span style="font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:#16a34a">51</span>
        <span style="font-size:10px;color:#9ca3af">allowed</span>
      </div>
      <div class="slot-range">17:30–19:00</div>
    </div>
  </div>
</div>
</body>
</html>
