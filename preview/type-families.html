<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { background: #f0f2f5; font-family: 'Inter', sans-serif; margin: 0; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .family { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px 14px; }
  .family-label { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: #9ca3af; margin-bottom: 6px; }
  .sample { color: #111827; }
  .tag { display: inline-block; font-size: 10px; font-weight: 600; background: #f8f9fb; color: #6b7280; padding: 2px 7px; border-radius: 3px; margin-top: 5px; border: 1px solid #e5e7eb; }
</style>
</head>
<body>
  <div class="family">
    <div class="family-label">Display — Syne</div>
    <div class="sample" style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:-0.3px">Cafeteria Monitor</div>
    <div class="sample" style="font-family:'Syne',sans-serif;font-size:17px;font-weight:800;letter-spacing:-0.3px;margin-top:3px;color:#374151">Live Dashboard</div>
    <span class="tag">Syne 700 / 800 · headings only</span>
  </div>
  <div class="family">
    <div class="family-label">Body — Inter</div>
    <div class="sample" style="font-family:'Inter',sans-serif;font-size:14px;font-weight:600">Kim Ji-woo (USR-042)</div>
    <div class="sample" style="font-family:'Inter',sans-serif;font-size:12px;font-weight:600;color:#6b7280;margin-top:3px;text-transform:uppercase;letter-spacing:0.8px">ALLOWED · DENIED · BREAKFAST</div>
    <div class="sample" style="font-family:'Inter',sans-serif;font-size:12px;font-weight:400;color:#6b7280;margin-top:3px">All Stations · Western · Korean · Chinese</div>
    <span class="tag">Inter 400 / 500 / 600 / 700</span>
  </div>
  <div class="family">
    <div class="family-label">Mono — DM Mono</div>
    <div class="sample" style="font-family:'DM Mono',monospace;font-size:20px;font-weight:500;letter-spacing:0.5px">14:32</div>
    <div class="sample" style="font-family:'DM Mono',monospace;font-size:26px;font-weight:500;color:#16a34a;margin-top:2px">247</div>
    <div class="sample" style="font-family:'DM Mono',monospace;font-size:11px;color:#6b7280;margin-top:3px">FRI MAY 02 · USR-042 · 09:14:55</div>
    <span class="tag">DM Mono 400 / 500</span>
  </div>
</body>
</html>
