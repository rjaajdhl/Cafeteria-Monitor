<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0f2f5; font-family: 'Inter', sans-serif; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px 10px; border-bottom: 1px solid #e5e7eb; background: #fff; }
  .title { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; letter-spacing: -0.3px; color: #111827; }
  .live-row { display: flex; align-items: center; gap: 5px; font-family: 'DM Mono', monospace; font-size: 11px; color: #6b7280; margin-top: 2px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
  .clock { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; color: #111827; letter-spacing: 0.5px; text-align: right; }
  .date  { font-family: 'DM Mono', monospace; font-size: 11px; color: #6b7280; margin-top: 1px; text-align: right; }
  .section-lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: #9ca3af; padding: 10px 16px 5px; }
  .offline-bar { padding: 7px 16px; font-size: 12px; font-weight: 600; text-align: center; background: #fff5f5; color: #dc2626; border-bottom: 1px solid #fecaca; }
</style>
</head>
<body>
<div class="section-lbl">Live state</div>
<div class="topbar">
  <div>
    <div class="title">Cafeteria Monitor</div>
    <div class="live-row">
      <div class="dot" style="background:#16a34a;animation:pulse 2s infinite"></div>
      <span>Live</span>
    </div>
  </div>
  <div>
    <div class="clock">14:32</div>
    <div class="date">FRI MAY 02</div>
  </div>
</div>
<div class="section-lbl" style="margin-top:4px">Offline state</div>
<div class="offline-bar">⚠ Biostar2 connection lost — reconnecting...</div>
<div class="topbar">
  <div>
    <div class="title">Cafeteria Monitor</div>
    <div class="live-row">
      <div class="dot" style="background:#dc2626"></div>
      <span>Biostar2 offline</span>
    </div>
  </div>
  <div>
    <div class="clock">14:32</div>
    <div class="date">FRI MAY 02</div>
  </div>
</div>
</body>
</html>
